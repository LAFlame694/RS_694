<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Summary Components</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Google Fonts (Inter) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }

      /* Stat Card Styling */
      .stat-card {
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
        border-radius: 12px !important;
        border: none;
      }

      .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08) !important;
      }

      /* Icon Container */
      .icon-shape {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-size: 1.25rem;
        margin-bottom: 1rem;
      }

      /* Highlighted style for the financial cards */
      .card-highlight {
        border-bottom: 4px solid transparent;
      }

      .card-highlight-success {
        border-bottom-color: #10b981;
      }
      .card-highlight-danger {
        border-bottom-color: #ef4444;
      }

      /* Custom Accent Colors (Professional Palette) */
      .bg-soft-primary {
        background-color: #e0e7ff;
        color: #4338ca;
      }
      .bg-soft-info {
        background-color: #e0f2fe;
        color: #0369a1;
      }
      .bg-soft-warning {
        background-color: #fef3c7;
        color: #b45309;
      }
      .bg-soft-success {
        background-color: #d1fae5;
        color: #065f46;
      }
      .bg-soft-danger {
        background-color: #fee2e2;
        color: #991b1b;
      }

      .text-label {
        color: #64748b;
        font-size: 0.875rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.025em;
      }

      .text-value {
        color: #1e293b;
        font-size: 1.5rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid mt-4">
      <!-- Dashboard Summary Row -->
      <!-- row-cols-1: Mobile | row-cols-md-2: Tablet (2 per row) | row-cols-lg-5: Desktop (5 per row) -->
      <div class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4">
        <!-- Card 1: Total Properties -->
        <div class="col">
          <div class="card h-100 shadow-sm stat-card">
            <div class="card-body p-4">
              <div class="icon-shape bg-soft-primary">
                <i class="fa-solid fa-city"></i>
              </div>
              <p class="text-label mb-1">Properties</p>
              <h3 class="text-value mb-0">24</h3>
            </div>
          </div>
        </div>

        <!-- Card 2: Total Units -->
        <div class="col">
          <div class="card h-100 shadow-sm stat-card">
            <div class="card-body p-4">
              <div class="icon-shape bg-soft-info">
                <i class="fa-solid fa-door-open"></i>
              </div>
              <p class="text-label mb-1">Total Units</p>
              <h3 class="text-value mb-0">142</h3>
            </div>
          </div>
        </div>

        <!-- Card 3: Total Tenants -->
        <div class="col">
          <div class="card h-100 shadow-sm stat-card">
            <div class="card-body p-4">
              <div class="icon-shape bg-soft-warning">
                <i class="fa-solid fa-users"></i>
              </div>
              <p class="text-label mb-1">Tenants</p>
              <h3 class="text-value mb-0">128</h3>
            </div>
          </div>
        </div>

        <!-- Card 4: Rent Collected (Highlighted) -->
        <div class="col">
          <div
            class="card h-100 shadow-sm stat-card card-highlight card-highlight-success"
          >
            <div class="card-body p-4">
              <div class="icon-shape bg-soft-success">
                <i class="fa-solid fa-hand-holding-dollar"></i>
              </div>
              <p class="text-label mb-1">Rent Collected</p>
              <h3 class="text-value mb-0 text-success">$42,500</h3>
            </div>
          </div>
        </div>

        <!-- Card 5: Outstanding Balance (Highlighted) -->
        <div class="col">
          <div
            class="card h-100 shadow-sm stat-card card-highlight card-highlight-danger"
          >
            <div class="card-body p-4">
              <div class="icon-shape bg-soft-danger">
                <i class="fa-solid fa-file-invoice-dollar"></i>
              </div>
              <p class="text-label mb-1">Outstanding</p>
              <h3 class="text-value mb-0 text-danger">$3,240</h3>
            </div>
          </div>
        </div>
      </div>
      <!-- End Row -->
    </div>
    <!-- End Container -->

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
